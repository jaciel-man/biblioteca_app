name: Build Flet APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet pymysql passlib bcrypt

      - name: Build APK
        run: |
          flet build apk --project BiblioBlog --module-name main

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BiblioBlog-APK
          path: build/apk/**/*.apk
